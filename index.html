<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meow</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: white;
      color: black;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.45;
      padding: 2rem 1.5rem;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: -0.3px;
      margin-bottom: 0.25rem;
      border-left: 5px solid #1e1e1e;
      padding-left: 1rem;
    }

    .sub {
      color: #2c2c2c;
      margin-bottom: 2rem;
      border-bottom: 1px solid #e0e0e0;
      padding-bottom: 0.75rem;
    }

    .part {
      background: #fefefe;
      border: 1px solid #ddd;
      border-radius: 18px;
      padding: 1.4rem 1.8rem;
      margin-bottom: 2rem;
    }

    .part-title {
      font-weight: 600;
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: #111;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }

    .form-group label {
      display: block;
      font-weight: 500;
      margin-bottom: 6px;
      font-size: 0.9rem;
    }

    .combo-input {
      width: 100%;
      max-width: 480px;
      padding: 10px 14px;
      font-size: 1rem;
      border: 1px solid #b0b0b0;
      border-radius: 14px;
      background: white;
      color: black;
      font-family: monospace;
    }

    .combo-input:focus {
      outline: none;
      border-color: #2c2c2c;
      box-shadow: 0 0 0 2px rgba(0,0,0,0.05);
    }

    .double-players {
      display: flex;
      flex-wrap: wrap;
      gap: 2rem;
      align-items: flex-end;
    }

    .player-box {
      flex: 1;
      min-width: 200px;
    }

    .update-btn {
      background: #111;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      transition: 0.1s;
      margin-top: 0.6rem;
    }

    .update-btn:hover {
      background: #2c2c2c;
    }

    .comparison-card {
      background: #f8f8f8;
      border-radius: 24px;
      padding: 1.5rem 2rem;
      border-left: 6px solid #1e1e1e;
    }

    .stats-badge {
      display: inline-block;
      background: white;
      border-radius: 60px;
      padding: 4px 14px;
      font-family: monospace;
      font-weight: 600;
      margin-right: 12px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
    }

    .comparison-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 2.5rem;
      justify-content: space-between;
      align-items: baseline;
      margin: 1.5rem 0 1rem;
    }

    .single-player-stat {
      background: white;
      border-radius: 28px;
      padding: 1rem 1.8rem;
      flex: 1;
      min-width: 200px;
      text-align: center;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }

    .player-name {
      font-weight: 700;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }

    .stat-number {
      font-size: 3.5rem;
      font-weight: 800;
      font-family: 'Courier New', monospace;
      letter-spacing: -1px;
      line-height: 1.2;
    }

    .diff-info {
      margin-top: 1.2rem;
      background: #eaeaea;
      padding: 10px 20px;
      border-radius: 40px;
      display: inline-block;
      font-size: 1.2rem;
      font-weight: 500;
    }

    .error-msg {
      color: #b00020;
      background: #ffe6e8;
      padding: 12px 18px;
      border-radius: 40px;
      margin: 1rem 0;
    }

    .loading {
      color: #2c2c2c;
      background: #f0f0f0;
      padding: 8px 16px;
      border-radius: 40px;
      display: inline-block;
    }

    footer {
      margin-top: 2rem;
      font-size: 0.7rem;
      color: #6c6c6c;
      text-align: center;
      border-top: 1px solid #eee;
      padding-top: 1.2rem;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Gambling Helper</h1>


  <!-- Part 1: Category -->
  <div class="part">
    <div class="part-title">1 · Select activity category</div>
    <input type="text" id="categoryInput" class="combo-input" list="categoryDatalist" placeholder="Type or select category...">
    <datalist id="categoryDatalist"></datalist>
  </div>

  <!-- Part 2: Two players -->
  <div class="part">
    <div class="part-title">2 · Compare two players</div>
    <div class="double-players">
      <div class="player-box">
        <label>Player 1</label>
        <input type="text" id="player1Input" class="combo-input" list="playerDatalist" placeholder="Search player...">
      </div>
      <div class="player-box">
        <label>Player 2</label>
        <input type="text" id="player2Input" class="combo-input" list="playerDatalist" placeholder="Search player...">
      </div>
      <div>
        <button id="refreshBtn" class="update-btn">Update & compare</button>
      </div>
    </div>
    <datalist id="playerDatalist"></datalist>
  </div>

  <!-- Part 3: Results (only comparison) -->
  <div class="part">
    <div class="part-title">3 · Activity results</div>
    <div id="resultsContainer">
      <div class="loading">Loading data from "II_Ungrouped_Stats.cvs" ...</div>
    </div>
  </div>

  <footer>Koy was here</footer>
</div>

<script>
  let categories = [], playersList = [], playerStatsMap = new Map();
  let dataLoaded = false, loadError = null;

  const categoryInput = document.getElementById('categoryInput');
  const player1Input = document.getElementById('player1Input');
  const player2Input = document.getElementById('player2Input');
  const refreshBtn = document.getElementById('refreshBtn');
  const resultsContainer = document.getElementById('resultsContainer');
  const categoryDatalist = document.getElementById('categoryDatalist');
  const playerDatalist = document.getElementById('playerDatalist');

  function updateCategoryDatalist() {
    if (!categoryDatalist) return;
    categoryDatalist.innerHTML = '';
    categories.forEach(cat => {
      const option = document.createElement('option');
      option.value = cat;
      categoryDatalist.appendChild(option);
    });
  }

  function updatePlayerDatalist() {
    if (!playerDatalist) return;
    playerDatalist.innerHTML = '';
    playersList.forEach(player => {
      const option = document.createElement('option');
      option.value = player;
      playerDatalist.appendChild(option);
    });
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function renderComparison() {
    if (!dataLoaded) {
      resultsContainer.innerHTML = '<div class="loading">Waiting for CSV data...</div>';
      return;
    }
    if (loadError) {
      resultsContainer.innerHTML = `<div class="error-msg">${escapeHtml(loadError)}</div>`;
      return;
    }
    if (!categories.length || !playersList.length) {
      resultsContainer.innerHTML = '<div class="error-msg">No valid data found.</div>';
      return;
    }

    let selectedCategory = categoryInput.value.trim();
    if (!selectedCategory || !categories.includes(selectedCategory)) {
      resultsContainer.innerHTML = '<div class="error-msg">Please select a valid category from the dropdown.</div>';
      return;
    }

    let p1 = player1Input.value.trim();
    let p2 = player2Input.value.trim();
    let p1Valid = playersList.includes(p1);
    let p2Valid = playersList.includes(p2);

    const p1Value = p1Valid ? playerStatsMap.get(p1)[selectedCategory] : null;
    const p2Value = p2Valid ? playerStatsMap.get(p2)[selectedCategory] : null;
    const isNumber = (v) => typeof v === 'number' && !isNaN(v);
    const formatStat = (v) => isNumber(v) ? v.toLocaleString() : (v !== undefined ? v : 'N/A');

    let html = `<div class="comparison-card">
      <div><span class="stats-badge">Category: ${escapeHtml(selectedCategory)}</span><span class="stats-badge">Players total: ${playersList.length}</span></div>
      <div class="comparison-grid">
        <div class="single-player-stat">
          <div class="player-name">${p1Valid ? escapeHtml(p1) : 'Invalid: ' + escapeHtml(p1)}</div>
          <div class="stat-number">${p1Valid ? formatStat(p1Value) : '—'}</div>
        </div>
        <div class="single-player-stat">
          <div class="player-name">${p2Valid ? escapeHtml(p2) : 'Invalid: ' + escapeHtml(p2)}</div>
          <div class="stat-number">${p2Valid ? formatStat(p2Value) : '—'}</div>
        </div>
      </div>`;

    if (p1Valid && p2Valid && isNumber(p1Value) && isNumber(p2Value)) {
      const diff = p1Value - p2Value;
      const diffAbs = Math.abs(diff);
      let diffText = '';
      if (diff > 0) diffText = `${escapeHtml(p1)} leads by ${diffAbs.toLocaleString()}`;
      else if (diff < 0) diffText = `${escapeHtml(p2)} leads by ${diffAbs.toLocaleString()}`;
      else diffText = `Tie – both have ${formatStat(p1Value)}`;
      html += `<div class="diff-info">${diffText}</div>`;
    } else if (p1Valid && p2Valid) {
      html += `<div class="diff-info">Comparison unavailable (non‑numeric values)</div>`;
    } else {
      html += `<div class="diff-info">Please select two valid players from the list</div>`;
    }
    html += `</div>`;
    resultsContainer.innerHTML = html;
  }

  function loadCSVData() {
    resultsContainer.innerHTML = '<div class="loading">Loading II_Ungrouped_Stats.cvs ...</div>';
    fetch('II_Ungrouped_Stats.cvs')
      .then(res => {
        if (!res.ok) throw new Error(`HTTP ${res.status}: File not found. Make sure the CSV is in the same folder and you are using a web server.`);
        return res.text();
      })
      .then(csvText => {
        Papa.parse(csvText, {
          delimiter: ",",
          dynamicTyping: true,
          skipEmptyLines: true,
          complete: (result) => {
            const data = result.data;
            if (!data || data.length < 2) {
              loadError = "CSV has insufficient rows (need header + at least one player).";
              dataLoaded = false;
              resultsContainer.innerHTML = `<div class="error-msg">${loadError}</div>`;
              return;
            }
            const headerRow = data[0];
            categories = [];
            for (let i = 1; i < headerRow.length; i++) {
              let cat = headerRow[i];
              categories.push(cat !== undefined && cat !== null ? String(cat).trim() : `Column_${i}`);
            }
            if (categories.length === 0) {
              loadError = "No category columns found.";
              dataLoaded = false;
              resultsContainer.innerHTML = `<div class="error-msg">${loadError}</div>`;
              return;
            }
            playerStatsMap.clear();
            playersList = [];
            for (let r = 1; r < data.length; r++) {
              const row = data[r];
              if (!row || row.length === 0) continue;
              let playerName = row[0];
              if (!playerName || String(playerName).trim() === "") continue;
              playerName = String(playerName).trim();
              playersList.push(playerName);
              const stats = {};
              for (let i = 0; i < categories.length; i++) {
                let val = (i+1 < row.length) ? row[i+1] : null;
                stats[categories[i]] = val;
              }
              playerStatsMap.set(playerName, stats);
            }
            if (playersList.length === 0) {
              loadError = "No valid players found.";
              dataLoaded = false;
              resultsContainer.innerHTML = `<div class="error-msg">${loadError}</div>`;
              return;
            }
            dataLoaded = true;
            loadError = null;
            updateCategoryDatalist();
            updatePlayerDatalist();
            if (categories.length) categoryInput.value = categories[0];
            if (playersList.length) {
              player1Input.value = playersList[0];
              player2Input.value = playersList[1] || playersList[0];
            }
            renderComparison();
          },
          error: (err) => {
            loadError = "CSV parsing error: " + (err.message || "unknown");
            dataLoaded = false;
            resultsContainer.innerHTML = `<div class="error-msg">${escapeHtml(loadError)}</div>`;
          }
        });
      })
      .catch(err => {
        loadError = err.message || "Failed to fetch CSV. Use a local web server (e.g., 'python -m http.server 8000').";
        dataLoaded = false;
        resultsContainer.innerHTML = `<div class="error-msg">${escapeHtml(loadError)}</div>`;
      });
  }

  refreshBtn.addEventListener('click', renderComparison);
  [categoryInput, player1Input, player2Input].forEach(inp => inp.addEventListener('keypress', e => { if (e.key === 'Enter') renderComparison(); }));
  loadCSVData();
</script>
</body>
</html>
